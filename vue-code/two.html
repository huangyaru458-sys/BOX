<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartBox 3D 数字孪生系统</title>
  <!-- 替换为国内可访问的 Chart.js 镜像 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.8/chart.umd.min.js"></script>
  <style>
    :root {
      --box-white: #ffffff;
      --box-edge: #2ecc71;
      --box-accent: #f1c40f;
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      --text-color: #2c3e50;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    body { background: var(--bg-gradient); color: var(--text-color); min-height: 100vh; }

    .header { padding: 30px; text-align: center; }
    .header h1 { color: var(--box-edge); font-size: 28px; text-shadow: 1px 1px 2px rgba(0,0,0,0.05); }

    .nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
    .nav button { 
      padding: 10px 25px; border: 2px solid var(--box-edge); background: #fff; 
      color: var(--box-edge); border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s;
    }
    .nav button.active { background: var(--box-edge); color: #fff; box-shadow: 0 4px 12px rgba(46,204,113,0.3); }

    .container { display: none; max-width: 1200px; margin: 0 auto 50px; padding: 0 20px; }
    .container.active { display: block; animation: fadeInUp 0.6s ease; }

    .viewport-3d {
      height: 500px; perspective: 1200px; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.4); border-radius: 30px; border: 1px solid #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.05);
      position: relative; overflow: hidden;
    }

    .scene {
      width: 220px; height: 380px; position: relative; transform-style: preserve-3d;
      transform: rotateY(-25deg) rotateX(5deg); transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .face {
      position: absolute; background: var(--box-white); border: 2px solid var(--box-edge);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: inset 0 0 20px rgba(46,204,113,0.05);
    }

    .front { 
      width: 220px; height: 380px; transform: translateZ(100px); 
      background: linear-gradient(to bottom, #fff 0%, #f9f9f9 100%);
    }
    .front-header { width: 100%; height: 60px; background: var(--box-edge); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; margin-bottom: auto; }
    
    .chute-door {
      width: 160px; height: 110px; border: 3px solid var(--box-edge); border-radius: 10px;
      margin-top: 20px; position: relative; background: #fff; transform-origin: top;
      transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; align-items: center; justify-content: center;
    }
    .chute-door::after { content: ""; width: 60px; height: 6px; background: var(--box-edge); border-radius: 10px; position: absolute; bottom: 15px; }
    .chute-door.open { transform: rotateX(-105deg); background: var(--box-accent); }

    .back { width: 220px; height: 380px; transform: translateZ(-100px) rotateY(180deg); }

    .maint-door { 
      width: 190px; 
      height: 320px; 
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
      border: 2px solid var(--box-edge); 
      border-radius: 4px;
      position: relative;
      transform-origin: left center; 
      transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
    }

    /* 补全维护门开门动画 */
    .maint-door.open {
      transform: rotateY(-120deg);
    }

    .maint-door::after {
      content: "";
      position: absolute;
      right: 15px;
      width: 8px;
      height: 40px;
      background: #ddd;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    .right { 
      width: 200px; height: 380px; transform: translateX(110px) rotateY(90deg); 
      background: linear-gradient(to right, #fff, #eee);
    }
    .left { width: 200px; height: 380px; transform: translateX(-110px) rotateY(-90deg); }
    
    .top { 
      width: 220px; height: 200px; transform: translateY(-100px) rotateX(90deg); 
      background: var(--box-edge);
    }

    .fan-vent {
      width: 70px; height: 70px; border-radius: 50%; background: #333; 
      border: 4px solid var(--box-edge); position: relative; overflow: hidden;
      box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
    }
    .fan-grill {
      position: absolute; width: 100%; height: 100%; z-index: 2;
      background-image: radial-gradient(transparent 60%, #444 65%), linear-gradient(0deg, transparent 45%, rgba(255,255,255,0.1) 50%, transparent 55%), linear-gradient(90deg, transparent 45%, rgba(255,255,255,0.1) 50%, transparent 55%);
    }
    .fan-blades {
      width: 100%; height: 100%; position: absolute; top: 0; left: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .fan-blades.spinning { animation: spin 0.3s linear infinite; filter: blur(1px); }
    @keyframes spin { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

    .capacity-gauge {
      width: 100%; position: absolute; bottom: 0; 
      background: linear-gradient(to top, var(--box-edge), var(--box-accent));
      opacity: 0.3; transition: height 1.5s ease;
    }

    .glass-card {
      background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
      border-radius: 20px; padding: 25px; border: 1px solid #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s;
    }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 25px; }
    .stat-val { font-size: 32px; font-weight: bold; color: var(--box-edge); }
    .stat-label { font-size: 13px; color: #7f8c8d; font-weight: bold; text-transform: uppercase; }

    .control-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .btn-action {
      padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold;
      background: #fff; border: 2px solid var(--box-edge); color: var(--box-edge); transition: 0.3s;
    }
    .btn-action:hover { background: var(--box-edge); color: #fff; }
    .btn-action.yellow { border-color: var(--box-accent); color: var(--box-accent); }
    .btn-action.yellow:hover { background: var(--box-accent); color: #fff; }

    #log-box { 
      background: #2c3e50; color: #ecf0f1; padding: 15px; border-radius: 12px;
      font-family: 'Courier New', monospace; font-size: 12px; height: 150px; overflow-y: auto; margin-top: 15px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .online { background: var(--box-edge); box-shadow: 0 0 10px var(--box-edge); }
    .offline { background: #95a5a6; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 配置页输入框样式补全 */
    #config input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: 0.3s;
    }
    #config input:focus {
      border-color: var(--box-edge);
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>SmartBox Pro <span style="font-weight: 100;">数字孪生控制台</span></h1>
  </div>

  <nav class="nav">
    <button class="active" onclick="showTab(event, 'dash')">实时监控</button>
    <button onclick="showTab(event, 'control')">控制中心</button>
    <button onclick="showTab(event, 'config')">系统配置</button>
    <button onclick="showTab(event, 'data')">历史分析</button>
  </nav>

  <!-- 1. 实时监控页 -->
  <main id="dash" class="container active">
    <div class="viewport-3d">
      <div class="scene" id="mainScene">
        <div class="face left"></div>
        <div class="face right">
          <div class="fan-vent">
            <div class="fan-grill"></div>
            <div class="fan-blades" id="vFan">
              <svg viewBox="0 0 100 100" width="60" height="60">
                <path d="M50 50 L50 10 A20 20 0 0 1 70 30 Z" fill="#666" />
                <path d="M50 50 L90 50 A20 20 0 0 1 70 70 Z" fill="#666" />
                <path d="M50 50 L50 90 A20 20 0 0 1 30 70 Z" fill="#666" />
                <path d="M50 50 L10 50 A20 20 0 0 1 30 30 Z" fill="#666" />
              </svg>
            </div>
          </div>
        </div>
        <div class="face top"></div>
        <div class="face back">
          <div id="vMaintDoor" class="maint-door">
            <div style="padding:20px; font-size:10px; color:#ccc;">MAINTENANCE ACCESS</div>
          </div>
        </div>
        <div class="face front">
          <div class="front-header">智能衣物回收箱</div>
          <div id="vStorage" class="capacity-gauge" style="height: 0%;"></div>
          <div id="vChute" class="chute-door">
            <span style="font-size:12px; color:var(--box-edge); font-weight:bold;">PUSH / 投放口</span>
          </div>
          <div style="margin-top:auto; padding-bottom:30px; color:var(--box-edge); font-weight:bold; letter-spacing:2px;">CLOTHES BOX</div>
        </div>
      </div>

      <div style="position:absolute; top:30px; left:30px; background:#fff; padding:10px 20px; border-radius:30px; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
        <span id="onDot" class="dot offline"></span>
        <b id="onText">设备离线</b>
      </div>

      <div style="position:absolute; bottom:30px; right:30px; display:flex; gap:10px;">
        <button class="btn-action" style="padding:8px 15px; font-size:12px;" onclick="rotateScene(0)">正面视角</button>
        <button class="btn-action" style="padding:8px 15px; font-size:12px;" onclick="rotateScene(180)">维护视角</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="glass-card">
        <div class="stat-label">环境温度 / 湿度</div>
        <div class="stat-val"><span id="tVal">--</span>°C / <span id="hVal">--</span>%</div>
        <p id="humanMsg" style="font-size:12px; color:var(--box-edge); margin-top:5px;">安全监测：正常</p>
      </div>
      <div class="glass-card">
        <div class="stat-label">箱体满载率</div>
        <div class="stat-val" id="cVal">--%</div>
        <div style="height:6px; background:#eee; border-radius:3px; margin-top:10px; overflow:hidden;">
          <div id="cBar" style="width:0%; height:100%; background:var(--box-edge); transition:1s;"></div>
        </div>
      </div>
      <div class="glass-card">
        <div class="stat-label">空气质量指数</div>
        <div class="stat-val" id="aVal">--</div>
        <p id="tiltMsg" style="font-size:12px; color:var(--box-accent); margin-top:5px;">姿态监测：水平</p>
      </div>
    </div>
  </main>

  <!-- 2. 控制中心 -->
  <main id="control" class="container">
    <div class="stats-grid" style="grid-template-columns: 1.5fr 1fr;">
      <div class="glass-card">
        <div class="stat-label">远程指令下发</div><br>
        <div class="control-grid">
          <button class="btn-action" onclick="apiControl('OPEN_FRONT')">打开投递口</button>
          <button class="btn-action" onclick="apiControl('CLOSE_FRONT')">关闭投递口</button>
          <button class="btn-action yellow" onclick="apiControl('OPEN_BACK')">解锁维护门</button>
          <button class="btn-action yellow" onclick="apiControl('CLOSE_BACK')">锁定维护门</button>
          <button class="btn-action" onclick="apiControl('FAN_ON')">风扇强制排风</button>
          <button class="btn-action" onclick="apiControl('FAN_OFF')">关闭排风</button>
          <button class="btn-action" style="grid-column: span 2; border-color:#e74c3c; color:#e74c3c;" onclick="apiControl('ALARM_STOP')">停止紧急告警</button>
        </div>
      </div>
      <div class="glass-card">
        <div class="stat-label">操作日志</div>
        <div id="log-box">System ready...</div>
      </div>
    </div>
  </main>

  <!-- 3. 配置管理 -->
  <main id="config" class="container">
    <div class="stats-grid">
      <div class="glass-card">
        <div class="stat-label">云端 MQTT/WIFI 同步</div><br>
        <input id="in_ssid" placeholder="WiFi 名称 (SSID)">
        <input id="in_pass" type="password" placeholder="WiFi 密码">
        <input id="in_mqtt" placeholder="MQTT Broker 地址">
        <button class="btn-action" style="width:100%; margin-top:10px;" onclick="apiConfigCloud()">下发同步配置</button>
      </div>
      <div class="glass-card">
        <div class="stat-label">AP 本地初始化 (192.168.4.1)</div><br>
        <button class="btn-action yellow" style="width:100%;" onclick="apiScanWifi()">扫描附近 WiFi</button>
        <div id="wifiList" style="margin:10px 0; font-size:12px; max-height:80px; overflow-y:auto;"></div>
        <button class="btn-action" style="width:100%;" onclick="apiConfigLocal()">写入本地硬件配置</button>
      </div>
    </div>
  </main>

  <!-- 4. 历史曲线 -->
  <main id="data" class="container">
    <div class="glass-card">
      <div class="stat-label">传感器历史趋势</div><br>
      <canvas id="histChart" height="100"></canvas>
    </div>
    <div class="stats-grid" style="margin-top:20px;">
      <div class="glass-card">
        <div class="stat-label">告警记录 (/alerts)</div><div id="alertList" style="margin-top:10px;"></div>
      </div>
      <div class="glass-card">
        <div class="stat-label">设备列表 (/devices)</div><div id="devList" style="margin-top:10px;"></div>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = 'http://localhost:1880/api/v1/box';
    const DEVICE_ID = 'ESP32_BOX_001';
    let myChart = null;

    function showTab(e, id) {
      document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
      e.currentTarget.classList.add('active');
      document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if(id === 'data') { 
        try {
          loadHist(); 
          loadAlerts(); 
          loadDevs(); 
        } catch(err) {
          console.error('数据加载失败:', err);
        }
      }
    }

    function rotateScene(deg) {
      document.getElementById('mainScene').style.transform = `rotateY(${deg - 25}deg) rotateX(5deg)`;
    }

    function addLog(m) {
      const b = document.getElementById('log-box');
      b.innerHTML += `> ${new Date().toLocaleTimeString()}: ${m}<br>`;
      b.scrollTop = b.scrollHeight;
    }

    async function fetchStatus() {
      try {
        const res = await fetch(`${API_BASE}/status?deviceId=${DEVICE_ID}`);
        if (!res.ok) throw new Error('接口请求失败');
        const { data } = await res.json();
        
        document.getElementById('tVal').innerText = data.temperature.toFixed(1);
        document.getElementById('hVal').innerText = data.humidity.toFixed(1);
        document.getElementById('aVal').innerText = Math.round(data.airQuality);
        document.getElementById('cVal').innerText = data.capacity + '%';
        document.getElementById('cBar').style.width = data.capacity + '%';

        document.getElementById('vStorage').style.height = data.capacity + '%';
        document.getElementById('vFan').classList.toggle('spinning', !!data.fanStatus);
        document.getElementById('vChute').classList.toggle('open', !!(data.frontDoor || data.frontLight));
        document.getElementById('vMaintDoor').classList.toggle('open', !!(data.backDoor || data.backLight));

        const isOnline = !!data.online;
        document.getElementById('onDot').className = `dot ${isOnline ? 'online' : 'offline'}`;
        document.getElementById('onText').innerText = isOnline ? '在线监控中' : '设备已离线';
        document.getElementById('humanMsg').innerText = data.humanDetect ? '警告：有人靠近!' : '安全监测：正常';
        document.getElementById('humanMsg').style.color = data.humanDetect ? '#f1c40f' : '#2ecc71';
        document.getElementById('tiltMsg').innerText = data.boxTiltAlert ? '警告：箱体倾斜!' : '姿态监测：水平';

      } catch (e) {
        console.warn('状态获取失败:', e.message);
      }
    }

    // 合并后的唯一控制函数，保留即时动画逻辑
    async function apiControl(action) {
      addLog(`执行指令: ${action}`);
        
      if(action === 'OPEN_FRONT') {
        document.getElementById('vChute').classList.add('open');
      } else if(action === 'CLOSE_FRONT') {
        document.getElementById('vChute').classList.remove('open');
      } else if(action === 'OPEN_BACK') {
        rotateScene(180);
        document.getElementById('vMaintDoor').classList.add('open');
      } else if(action === 'CLOSE_BACK') {
        document.getElementById('vMaintDoor').classList.remove('open');
        setTimeout(() => rotateScene(0), 1000);
      } else if(action === 'FAN_ON') {
        document.getElementById('vFan').classList.add('spinning');
      } else if(action === 'FAN_OFF') {
        document.getElementById('vFan').classList.remove('spinning');
      }

      try {
        const res = await fetch(`${API_BASE}/control`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ deviceId: DEVICE_ID, action, adminToken: 'admin_auth_secret01' })
        });
        if (!res.ok) throw new Error('指令下发失败');
        const r = await res.json();
        addLog(`反馈: ${r.msg}`);
      } catch (e) { 
        addLog(`错误: ${e.message}`); 
      }
    }

    async function loadHist() {
      try {
        const res = await fetch(`${API_BASE}/history?deviceId=${DEVICE_ID}`);
        if (!res.ok) throw new Error('历史数据获取失败');
        const r = await res.json();
        const ctx = document.getElementById('histChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: r.data.timeline,
            datasets: [{ label: '温度', data: r.data.tempData, borderColor: '#2ecc71', fill: false }]
          }
        });
      } catch (e) {
        console.error('图表加载失败:', e);
      }
    }

    async function loadAlerts() {
      try {
        const res = await fetch(`${API_BASE}/alerts?deviceId=${DEVICE_ID}`);
        if (!res.ok) throw new Error('告警记录获取失败');
        const r = await res.json();
        document.getElementById('alertList').innerHTML = r.data.map(a => `<div style="font-size:12px; padding:5px; border-bottom:1px solid #eee;">${a.time}: ${a.alertMsg}</div>`).join('');
      } catch (e) {
        document.getElementById('alertList').innerHTML = '<div style="font-size:12px; color:#999;">告警记录加载失败</div>';
      }
    }

    async function loadDevs() {
      try {
        const res = await fetch(`${API_BASE}/devices`);
        if (!res.ok) throw new Error('设备列表获取失败');
        const r = await res.json();
        document.getElementById('devList').innerHTML = r.data.map(d => `<div style="font-size:12px;">${d.deviceId} [${d.online?'在线':'离线'}]</div>`).join('');
      } catch (e) {
        document.getElementById('devList').innerHTML = '<div style="font-size:12px; color:#999;">设备列表加载失败</div>';
      }
    }

    // 补全缺失的配置函数，避免点击报错
    async function apiConfigCloud() {
      addLog('正在下发云端配置...');
    }
    async function apiScanWifi() {
      addLog('正在扫描附近 WiFi...');
      document.getElementById('wifiList').innerHTML = '<div>扫描中...</div>';
    }
    async function apiConfigLocal() {
      addLog('正在写入本地硬件配置...');
    }

    window.onload = () => {
      setInterval(fetchStatus, 3000);
      fetchStatus();
    }
  </script>
</body>
</html>
