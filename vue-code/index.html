<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能衣物回收箱管理系统</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Microsoft YaHei", Arial, sans-serif; background: #f4f7fb; color: #243447; }
    .header { padding: 26px 20px; color: #fff; text-align: center; background: linear-gradient(135deg, #264761, #3598d5); }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header p { opacity: .9; }
    .nav { display: flex; justify-content: center; gap: 12px; padding: 22px 12px; flex-wrap: wrap; }
    .nav button { min-width: 110px; padding: 12px 20px; border: 0; border-radius: 8px; background: #fff; color: #2387c7; font-weight: 700; cursor: pointer; box-shadow: 0 3px 12px rgba(23, 47, 71, .08); }
    .nav button.active { background: #3498db; color: #fff; outline: 3px solid #222; }
    .container { display: none; max-width: 1180px; margin: 0 auto 34px; padding: 0 18px; }
    .container.active { display: block; }
    .panel, .card, .chart-box { background: #fff; border-radius: 12px; padding: 22px; box-shadow: 0 8px 24px rgba(30, 57, 83, .08); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .card h3 { font-size: 15px; color: #5c6b7a; margin-bottom: 12px; }
    .value { font-size: 30px; font-weight: 800; }
    .muted { color: #7a8794; font-size: 13px; margin-top: 6px; }
    .status-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; background: #e74c3c; }
    .status-dot.online { background: #27ae60; }
    .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-top: 18px; }
    .status-item { padding: 16px; border-radius: 10px; background: #f7f9fc; text-align: center; }
    .status-label { font-size: 13px; color: #657282; margin-bottom: 8px; }
    .status-value { font-weight: 800; font-size: 18px; }
    .control-grid { display: grid; grid-template-columns: repeat(2, minmax(160px, 1fr)); gap: 16px; margin-top: 18px; }
    .btn { border: 0; border-radius: 7px; min-height: 46px; padding: 12px 18px; color: #fff; font-weight: 800; cursor: pointer; font-size: 15px; }
    .btn:disabled { opacity: .55; cursor: wait; }
    .blue { background: #3498db; }
    .red { background: #e74c3c; }
    .green { background: #27ae60; }
    .orange { background: #f39c12; }
    .wide { grid-column: 1 / -1; }
    .settings { display: grid; gap: 12px; margin-top: 22px; }
    label { font-weight: 700; color: #536170; }
    input { width: 100%; padding: 12px; border: 1px solid #d8e0e8; border-radius: 7px; font-size: 15px; }
    pre { margin-top: 16px; padding: 14px; background: #17212b; color: #d9f3ff; border-radius: 8px; white-space: pre-wrap; min-height: 86px; }
    .toast { position: fixed; top: 18px; right: 18px; z-index: 99; display: none; padding: 12px 18px; border-radius: 8px; color: #fff; font-weight: 800; background: #3498db; }
    .toast.show { display: block; }
    .list { display: grid; gap: 12px; margin-top: 14px; }
    .list-item { padding: 14px; border-radius: 8px; background: #f7f9fc; }
    .chart-box { margin-top: 18px; }
    @media (max-width: 640px) { .control-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>智能衣物回收箱管理系统</h1>
    <p>实时监控 · 远程控制 · 数据可视化</p>
  </div>

  <div class="nav">
    <button class="active" onclick="showTab(event, 'dashboard')">实时监控</button>
    <button onclick="showTab(event, 'history')">历史数据</button>
    <button onclick="showTab(event, 'control')">远程控制</button>
    <button onclick="showTab(event, 'alerts')">告警管理</button>
    <button onclick="showTab(event, 'devices')">设备列表</button>
  </div>

  <main id="dashboard" class="container active">
    <section class="grid">
      <div class="card"><h3>设备状态</h3><div class="value"><span id="onlineDot" class="status-dot"></span><span id="deviceStatusText">离线</span></div><div class="muted">ESP32_BOX_001</div></div>
      <div class="card"><h3>箱体温度</h3><div class="value"><span id="tempValue">--</span>°C</div></div>
      <div class="card"><h3>箱体湿度</h3><div class="value"><span id="humValue">--</span>%</div></div>
      <div class="card"><h3>满载率</h3><div class="value"><span id="capValue">--</span>%</div></div>
      <div class="card"><h3>空气质量</h3><div class="value"><span id="airValue">--</span>%</div><div class="muted">MQ135 映射百分比</div></div>
      <div class="card"><h3>人体检测</h3><div class="value" id="humanValue">无人</div></div>
    </section>

    <section class="status-grid">
      <div class="status-item"><div class="status-label">网络模式</div><div id="netMode" class="status-value">--</div></div>
      <div class="status-item"><div class="status-label">风扇状态</div><div id="fanStatus" class="status-value">--</div></div>
      <div class="status-item"><div class="status-label">投放门 GPIO33</div><div id="frontDoor" class="status-value">--</div></div>
      <div class="status-item"><div class="status-label">维护门 GPIO12</div><div id="backDoor" class="status-value">--</div></div>
      <div class="status-item"><div class="status-label">倾倒告警</div><div id="tiltStatus" class="status-value">--</div></div>
      <div class="status-item"><div class="status-label">系统状态</div><div id="systemState" class="status-value">--</div></div>
    </section>

    <section class="chart-box">
      <h3>实时趋势图</h3>
      <canvas id="realtimeChart" height="120"></canvas>
    </section>
  </main>

  <main id="control" class="container">
    <section class="panel">
      <h2>远程控制</h2>
      <div class="control-grid">
        <button class="btn blue" onclick="sendCommand('OPEN_FRONT')">打开投放门</button>
        <button class="btn red" onclick="sendCommand('CLOSE_FRONT')">关闭投放门</button>
        <button class="btn green" onclick="sendCommand('OPEN_BACK')">打开维护门</button>
        <button class="btn orange" onclick="sendCommand('CLOSE_BACK')">关闭维护门</button>
        <button class="btn blue" onclick="sendCommand('FAN_ON')">风扇开启</button>
        <button class="btn red" onclick="sendCommand('FAN_OFF')">风扇关闭</button>
        <button class="btn orange wide" onclick="sendCommand('ALARM_STOP')">停止告警</button>
      </div>

      <div class="settings">
        <label for="apiUrl">后端 API 地址</label>
        <input id="apiUrl" value="http://localhost:1880/api/v1/box">
        <label for="adminToken">管理员 Token</label>
        <input id="adminToken" value="admin_auth_secret01">
        <label for="wifiSsid">WiFi SSID</label>
        <input id="wifiSsid" value="" placeholder="例如 hhhhhh">
        <label for="wifiPass">WiFi Password</label>
        <input id="wifiPass" type="password" value="" placeholder="输入 WiFi 密码">
        <label for="mqttHost">MQTT Host</label>
        <input id="mqttHost" value="192.168.34.228" placeholder="192.168.34.228">
        <label for="mqttPort">MQTT Port</label>
        <input id="mqttPort" value="1883" inputmode="numeric" placeholder="1883">
        <button class="btn blue" onclick="saveSettings()">保存设置</button>
        <button class="btn green" onclick="scanWifiNetworks()">扫描 WiFi</button>
        <button class="btn orange" onclick="pushLocalDeviceConfig()">AP 模式本地配置</button>
        <div class="status-item">
          <div class="status-label">切换状态</div>
          <div id="switchStatus" class="status-value">待配置</div>
        </div>
        <div id="wifiList" class="list"></div>
      </div>

      <pre id="commandLog">等待下发指令...</pre>
    </section>
  </main>

  <main id="history" class="container">
    <section class="chart-box"><h2>历史数据</h2><canvas id="historyChart" height="150"></canvas></section>
  </main>

  <main id="alerts" class="container">
    <section class="panel"><h2>告警管理</h2><div id="alertList" class="list"></div></section>
  </main>

  <main id="devices" class="container">
    <section class="panel"><h2>设备列表</h2><div id="deviceList" class="list"></div></section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const DEFAULT_API_BASE = 'http://localhost:1880/api/v1/box';
    const DEVICE_ID = 'ESP32_BOX_001';
    let realtimeChart = null;
    let historyChart = null;
    let commandBusy = false;

    function showTab(event, id) {
      document.querySelectorAll('.nav button').forEach((button) => button.classList.remove('active'));
      event.currentTarget.classList.add('active');
      document.querySelectorAll('.container').forEach((panel) => panel.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (id === 'history') loadHistory();
      if (id === 'alerts') loadAlerts();
      if (id === 'devices') loadDevices();
    }

    function getApiUrl() {
      return (localStorage.getItem('apiUrl') || DEFAULT_API_BASE).replace(/\/$/, '');
    }

    function getAdminToken() {
      return localStorage.getItem('adminToken') || 'admin_auth_secret01';
    }

    function getDeviceConfig() {
      return {
        deviceId: DEVICE_ID,
        wifiSsid: localStorage.getItem('wifiSsid') || '',
        wifiPass: localStorage.getItem('wifiPass') || '',
        mqttServer: localStorage.getItem('mqttHost') || '192.168.34.228',
        mqttPort: Number(localStorage.getItem('mqttPort') || 1883),
        adminToken: getAdminToken(),
        ts: Date.now()
      };
    }

    function saveSettings() {
      localStorage.setItem('apiUrl', document.getElementById('apiUrl').value.trim() || DEFAULT_API_BASE);
      localStorage.setItem('adminToken', document.getElementById('adminToken').value.trim() || 'admin_auth_secret01');
      localStorage.setItem('wifiSsid', document.getElementById('wifiSsid').value.trim());
      localStorage.setItem('wifiPass', document.getElementById('wifiPass').value);
      localStorage.setItem('mqttHost', document.getElementById('mqttHost').value.trim() || '192.168.34.228');
      localStorage.setItem('mqttPort', document.getElementById('mqttPort').value.trim() || '1883');
      showToast('设置已保存', 'success');
      setSwitchStatus('正在切换');
      pushDeviceConfig();
      loadRealtimeData();
    }

    function setSwitchStatus(text) {
      const el = document.getElementById('switchStatus');
      if (el) el.textContent = text;
    }

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.background = type === 'error' ? '#e74c3c' : type === 'success' ? '#27ae60' : '#3498db';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2600);
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, options);
      const text = await response.text();
      let body = null;
      try { body = text ? JSON.parse(text) : null; } catch { body = { raw: text }; }
      if (!response.ok) {
        throw new Error((body && (body.msg || body.message)) || `HTTP ${response.status}`);
      }
      return body;
    }

    function setButtonsDisabled(disabled) {
      document.querySelectorAll('#control .btn').forEach((button) => {
        if (button.textContent !== '保存设置') button.disabled = disabled;
      });
    }

    async function sendCommand(action) {
      if (commandBusy) return;
      commandBusy = true;
      setButtonsDisabled(true);
      const url = `${getApiUrl()}/control`;
      const payload = {
        deviceId: DEVICE_ID,
        action,
        command: action,
        cmd: action,
        adminToken: getAdminToken(),
        source: 'html_frontend',
        ts: Date.now()
      };
      const log = document.getElementById('commandLog');
      log.textContent = `POST ${url}\n${JSON.stringify(payload, null, 2)}\n\n等待后端返回...`;

      try {
        const result = await requestJson(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        log.textContent = `指令已下发: ${action}\n\n后端返回:\n${JSON.stringify(result, null, 2)}`;
        showToast(`指令已下发: ${action}`, 'success');
        optimisticActionState(action);
        setTimeout(loadRealtimeData, 350);
        setTimeout(loadRealtimeData, 1500);
      } catch (error) {
        log.textContent = `指令下发失败: ${action}\n接口: ${url}\n错误: ${error.message}`;
        showToast(`指令下发失败: ${error.message}`, 'error');
      } finally {
        commandBusy = false;
        setButtonsDisabled(false);
      }
    }

    function optimisticActionState(action) {
      const map = {
        OPEN_FRONT: { frontDoor: true, systemState: 'PUTTING' },
        CLOSE_FRONT: { frontDoor: false },
        OPEN_BACK: { backDoor: true },
        CLOSE_BACK: { backDoor: false },
        FAN_ON: { fanStatus: true },
        FAN_OFF: { fanStatus: false },
        ALARM_STOP: { boxTiltAlert: false, fanStatus: false }
      };
      const patch = map[action];
      if (!patch) return;
      const current = {
        frontDoor: document.getElementById('frontDoor').textContent.includes('打'),
        backDoor: document.getElementById('backDoor').textContent.includes('打'),
        fanStatus: document.getElementById('fanStatus').textContent.includes('运'),
        boxTiltAlert: document.getElementById('tiltStatus').textContent.includes('异常'),
        systemState: document.getElementById('systemState').textContent || 'STANDBY'
      };
      updateDashboard(Object.assign({}, current, patch));
      setSwitchStatus(`已下发 ${action}，等待设备回包校正`);
    }

    async function pushDeviceConfig() {
      const payload = getDeviceConfig();
      try {
        const result = await requestJson(`${getApiUrl()}/config`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        document.getElementById('commandLog').textContent = `配置已下发\n\n${JSON.stringify(result, null, 2)}`;
        setSwitchStatus('配置已下发，等待设备恢复');
        showToast('WiFi/MQTT 配置已下发', 'success');
        waitDeviceRecovered();
      } catch (error) {
        document.getElementById('commandLog').textContent = `配置下发失败\n${error.message}`;
        setSwitchStatus('后端下发失败，可尝试 AP 本地配置');
        showToast(`配置下发失败: ${error.message}`, 'error');
      }
    }

    async function pushLocalDeviceConfig() {
      const payload = getDeviceConfig();
      setSwitchStatus('正在通过 AP 配置设备');
      try {
        const result = await requestJson('http://192.168.4.1/api/local/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        document.getElementById('commandLog').textContent = `AP 本地配置已发送\n\n${JSON.stringify(result, null, 2)}`;
        setSwitchStatus('AP 配置已发送，等待重连');
        waitDeviceRecovered();
      } catch (error) {
        document.getElementById('commandLog').textContent = `AP 本地配置失败\n请先连接 WiFi: CLOTHES_BOX_AP\n密码: 12345678\n\n${error.message}`;
        setSwitchStatus('AP 配置失败');
        showToast('请先连接 CLOTHES_BOX_AP', 'error');
      }
    }

    async function scanWifiNetworks() {
      const list = document.getElementById('wifiList');
      list.innerHTML = '<div class="list-item">正在扫描，请稍等...</div>';
      try {
        const result = await requestJson('http://192.168.4.1/api/local/networks');
        const networks = result.networks || [];
        list.innerHTML = networks.length ? networks.map((n) =>
          `<div class="list-item" onclick="document.getElementById('wifiSsid').value='${String(n.ssid).replace(/'/g, "\\'")}';">${n.ssid || '(隐藏网络)'} RSSI:${n.rssi} ${n.secure ? '加密' : '开放'}</div>`
        ).join('') : '<div class="list-item">没有扫描到 WiFi</div>';
      } catch (error) {
        list.innerHTML = `<div class="list-item">扫描失败：请先连接 CLOTHES_BOX_AP，再点扫描<br>${error.message}</div>`;
      }
    }

    async function waitDeviceRecovered() {
      for (let i = 0; i < 20; i++) {
        await new Promise((resolve) => setTimeout(resolve, 1500));
        try {
          const result = await requestJson(`${getApiUrl()}/status`);
          const data = result && result.code === 200 ? result.data : result;
          updateDashboard(data || {});
          if (data && data.online !== false && data.systemState !== 'OFFLINE') {
            setSwitchStatus('已连接，已恢复');
            showToast('设备已恢复连接', 'success');
            return;
          }
        } catch (e) {
          setSwitchStatus(`等待恢复 ${i + 1}/20`);
        }
      }
      setSwitchStatus('未恢复，请连接 CLOTHES_BOX_AP 走 AP 本地配置');
    }

    async function loadRealtimeData() {
      try {
        const result = await requestJson(`${getApiUrl()}/status`);
        const data = result && result.code === 200 ? result.data : result;
        updateDashboard(data || {});
        addRealtimePoint(data || {});
      } catch (error) {
        document.getElementById('onlineDot').classList.remove('online');
        document.getElementById('deviceStatusText').textContent = '离线';
      }
    }

    function boolText(value, yes, no) {
      return value ? yes : no;
    }

    function updateDashboard(data) {
      const online = data.online !== false && data.systemState !== 'OFFLINE';
      document.getElementById('onlineDot').classList.toggle('online', online);
      document.getElementById('deviceStatusText').textContent = online ? '在线' : '离线';
      if (data.temperature !== undefined) document.getElementById('tempValue').textContent = Number(data.temperature).toFixed(1);
      if (data.humidity !== undefined) document.getElementById('humValue').textContent = Number(data.humidity).toFixed(1);
      if (data.capacity !== undefined) document.getElementById('capValue').textContent = Number(data.capacity).toFixed(1);
      if (data.airQuality !== undefined) document.getElementById('airValue').textContent = Math.round(Number(data.airQuality));
      if (data.humanDetect !== undefined) document.getElementById('humanValue').textContent = boolText(data.humanDetect, '有人', '无人');
      if (data.netMode !== undefined) document.getElementById('netMode').textContent = data.netMode;
      if (data.fanStatus !== undefined) document.getElementById('fanStatus').textContent = boolText(data.fanStatus, '运行中', '关闭');
      if (data.frontDoor !== undefined || data.frontLight !== undefined) document.getElementById('frontDoor').textContent = boolText(data.frontDoor ?? data.frontLight, '打开', '关闭');
      if (data.backDoor !== undefined || data.backLight !== undefined) document.getElementById('backDoor').textContent = boolText(data.backDoor ?? data.backLight, '打开', '关闭');
      if (data.boxTiltAlert !== undefined) document.getElementById('tiltStatus').textContent = boolText(data.boxTiltAlert, '异常', '正常');
      if (data.systemState !== undefined) document.getElementById('systemState').textContent = data.systemState;
    }

    function initRealtimeChart() {
      const ctx = document.getElementById('realtimeChart').getContext('2d');
      realtimeChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [
            { label: '温度', data: [], borderColor: '#e74c3c', tension: .3 },
            { label: '湿度', data: [], borderColor: '#3498db', tension: .3 },
            { label: '空气质量', data: [], borderColor: '#27ae60', tension: .3 }
          ]
        },
        options: { responsive: true, animation: false }
      });
    }

    function addRealtimePoint(data) {
      if (!realtimeChart) return;
      const label = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      if (realtimeChart.data.labels.length >= 20) {
        realtimeChart.data.labels.shift();
        realtimeChart.data.datasets.forEach((dataset) => dataset.data.shift());
      }
      realtimeChart.data.labels.push(label);
      realtimeChart.data.datasets[0].data.push(Number(data.temperature || 0));
      realtimeChart.data.datasets[1].data.push(Number(data.humidity || 0));
      realtimeChart.data.datasets[2].data.push(Number(data.airQuality || 0));
      realtimeChart.update();
    }

    async function loadHistory() {
      try {
        const result = await requestJson(`${getApiUrl()}/history?deviceId=${DEVICE_ID}&limit=50`);
        const data = result.data || {};
        const labels = data.timeline || [];
        const temp = data.tempData || [];
        const hum = data.humidityData || [];
        const air = data.airData || [];
        const cap = data.capacityData || [];
        const ctx = document.getElementById('historyChart').getContext('2d');
        if (historyChart) historyChart.destroy();
        historyChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [
              { label: '温度', data: temp, borderColor: '#e74c3c', tension: .3 },
              { label: '湿度', data: hum, borderColor: '#3498db', tension: .3 },
              { label: '空气质量', data: air, borderColor: '#27ae60', tension: .3 },
              { label: '满载率', data: cap, borderColor: '#f39c12', tension: .3 }
            ]
          },
          options: { responsive: true }
        });
      } catch (error) {
        showToast(`历史数据读取失败: ${error.message}`, 'error');
      }
    }

    async function loadAlerts() {
      const list = document.getElementById('alertList');
      try {
        const result = await requestJson(`${getApiUrl()}/alerts?deviceId=${DEVICE_ID}`);
        const alerts = result.data || [];
        list.innerHTML = alerts.length ? alerts.map((item) => `<div class="list-item"><b>${item.alertType}</b><br>${item.alertMsg}<br><span class="muted">${item.time || ''}</span></div>`).join('') : '<div class="list-item">暂无告警</div>';
      } catch (error) {
        list.innerHTML = `<div class="list-item">读取失败: ${error.message}</div>`;
      }
    }

    async function loadDevices() {
      const list = document.getElementById('deviceList');
      try {
        const result = await requestJson(`${getApiUrl()}/devices`);
        const devices = result.data || [];
        list.innerHTML = devices.length ? devices.map((item) => `<div class="list-item"><b>${item.deviceId}</b><br>状态: ${item.online ? '在线' : '离线'}<br><span class="muted">${item.lastSeen || ''}</span></div>`).join('') : '<div class="list-item">暂无设备</div>';
      } catch (error) {
        list.innerHTML = `<div class="list-item">读取失败: ${error.message}</div>`;
      }
    }

    window.addEventListener('load', () => {
      document.getElementById('apiUrl').value = getApiUrl();
      document.getElementById('adminToken').value = getAdminToken();
      document.getElementById('wifiSsid').value = localStorage.getItem('wifiSsid') || '';
      document.getElementById('wifiPass').value = localStorage.getItem('wifiPass') || '';
      document.getElementById('mqttHost').value = localStorage.getItem('mqttHost') || '192.168.34.228';
      document.getElementById('mqttPort').value = localStorage.getItem('mqttPort') || '1883';
      initRealtimeChart();
      loadRealtimeData();
      setInterval(loadRealtimeData, 3000);
    });
  </script>
</body>
</html>
