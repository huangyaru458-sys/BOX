<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartBox 回收箱监控台</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --green: #2ecc71;
      --yellow: #f1c40f;
      --red: #e74c3c;
      --blue: #3498db;
      --ink: #2c3e50;
      --muted: #7f8c8d;
      --bg: linear-gradient(135deg, #eef3fa 0%, #cdd8e8 100%);
      --card: rgba(255, 255, 255, 0.82);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    .header {
      padding: 28px 20px 18px;
      text-align: center;
    }

    .header h1 {
      color: var(--green);
      font-size: 30px;
      letter-spacing: 0;
    }

    .header p {
      margin-top: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .nav button {
      padding: 10px 24px;
      border: 2px solid var(--green);
      background: #fff;
      color: var(--green);
      border-radius: 999px;
      cursor: pointer;
      font-weight: 800;
      transition: 0.2s;
    }

    .nav button.active,
    .nav button:hover {
      background: var(--green);
      color: #fff;
      box-shadow: 0 8px 20px rgba(46, 204, 113, 0.24);
    }

    .container {
      display: none;
      max-width: 1220px;
      margin: 0 auto 50px;
      padding: 0 20px;
    }

    .container.active {
      display: block;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .viewport-3d {
      height: 500px;
      perspective: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.42);
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 20px 50px rgba(0,0,0,0.06);
      position: relative;
      overflow: hidden;
    }

    .scene {
      width: 220px;
      height: 380px;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateY(-25deg) rotateX(5deg);
      transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .face {
      position: absolute;
      background: #fff;
      border: 2px solid var(--green);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 20px rgba(46,204,113,0.06);
    }

    .front {
      width: 220px;
      height: 380px;
      transform: translateZ(100px);
      background: linear-gradient(to bottom, #fff 0%, #f8fbf9 100%);
    }

    .front-header {
      width: 100%;
      height: 60px;
      background: var(--green);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      margin-bottom: auto;
    }

    .chute-door {
      width: 160px;
      height: 110px;
      border: 3px solid var(--green);
      border-radius: 10px;
      margin-top: 20px;
      position: relative;
      background: #fff;
      transform-origin: top;
      transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chute-door::after {
      content: "";
      width: 60px;
      height: 6px;
      background: var(--green);
      border-radius: 10px;
      position: absolute;
      bottom: 15px;
    }

    .chute-door.open {
      transform: rotateX(-105deg);
      background: var(--yellow);
      box-shadow: 0 0 28px rgba(241, 196, 15, 0.48);
    }

    .back {
      width: 220px;
      height: 380px;
      transform: translateZ(-100px) rotateY(180deg);
    }

    .maint-door {
      width: 190px;
      height: 320px;
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
      border: 2px solid var(--green);
      border-radius: 4px;
      position: relative;
      transform-origin: left center;
      transition: transform 0.9s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
    }

    .maint-door.open {
      transform: rotateY(-115deg);
      background: #ecfdf3;
      box-shadow: 0 0 30px rgba(46,204,113,0.36);
    }

    .left {
      width: 200px;
      height: 380px;
      transform: rotateY(-90deg) translateZ(100px);
      background: #f6f8fa;
    }

    .right {
      width: 200px;
      height: 380px;
      transform: rotateY(90deg) translateZ(120px);
      background: #f6f8fa;
    }

    .top {
      width: 220px;
      height: 200px;
      transform: rotateX(90deg) translateZ(100px);
      background: #fff;
    }

    .fan-vent {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #333;
      border: 4px solid var(--green);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
    }

    .fan-grill {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(transparent 60%, #444 65%),
        linear-gradient(0deg, transparent 45%, rgba(255,255,255,0.16) 50%, transparent 55%),
        linear-gradient(90deg, transparent 45%, rgba(255,255,255,0.16) 50%, transparent 55%);
      z-index: 2;
    }

    .fan-blades {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fan-blades.spinning {
      animation: spin 0.3s linear infinite;
      filter: blur(1px);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .capacity-gauge {
      width: 100%;
      position: absolute;
      bottom: 0;
      background: linear-gradient(to top, var(--green), var(--yellow));
      opacity: 0.32;
      transition: height 1.5s ease;
    }

    .glass-card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.82);
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 25px;
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
    }

    .stat-val {
      margin-top: 8px;
      font-size: 36px;
      font-weight: 900;
      color: var(--green);
    }

    .small-text {
      font-size: 13px;
      margin-top: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    .status-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(46,204,113,0.14);
    }

    .status-name {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
    }

    .status-chip {
      min-width: 56px;
      text-align: center;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      background: #ecf0f1;
      color: var(--muted);
    }

    .status-chip.on {
      background: rgba(46,204,113,0.16);
      color: #27ae60;
      box-shadow: 0 0 10px rgba(46,204,113,0.18);
    }

    .status-chip.off {
      background: rgba(149,165,166,0.16);
      color: var(--muted);
    }

    .status-chip.warn {
      background: rgba(241,196,15,0.2);
      color: #c99700;
    }

    .status-chip.danger {
      background: rgba(231,76,60,0.16);
      color: var(--red);
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .btn-action {
      padding: 15px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 900;
      background: #fff;
      border: 2px solid var(--green);
      color: var(--green);
      transition: 0.2s;
    }

    .btn-action:hover {
      background: var(--green);
      color: #fff;
    }

    .btn-action.yellow {
      border-color: var(--yellow);
      color: #c99700;
    }

    .btn-action.yellow:hover {
      background: var(--yellow);
      color: #fff;
    }

    .btn-action.red {
      border-color: var(--red);
      color: var(--red);
    }

    .btn-action.red:hover {
      background: var(--red);
      color: #fff;
    }

    #log-box {
      background: #2c3e50;
      color: #ecf0f1;
      padding: 15px;
      border-radius: 12px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      height: 170px;
      overflow-y: auto;
      margin-top: 15px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
    }

    .online {
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
    }

    .offline {
      background: #95a5a6;
    }

    .input-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 800;
    }

    .input-row input {
      border: 1px solid #dce5ec;
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
    }

    .list-box {
      margin-top: 10px;
      font-size: 13px;
      color: var(--ink);
      max-height: 260px;
      overflow: auto;
    }

    .list-item {
      padding: 8px 0;
      border-bottom: 1px solid rgba(127,140,141,0.18);
    }

    @media (max-width: 700px) {
      .viewport-3d { height: 420px; }
      .status-list { grid-template-columns: 1fr; }
      .control-grid { grid-template-columns: 1fr; }
      .input-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>SmartBox 回收箱监控台</h1>
    <p>实时状态 · 远程控制 · 历史数据 · 告警查看</p>
  </div>

  <nav class="nav">
    <button class="active" onclick="showTab(event, 'dash')">实时监控</button>
    <button onclick="showTab(event, 'control')">控制中心</button>
    <button onclick="showTab(event, 'config')">系统配置</button>
    <button onclick="showTab(event, 'data')">历史分析</button>
  </nav>

  <main id="dash" class="container active">
    <div class="viewport-3d">
      <div class="scene" id="mainScene">
        <div class="face left"></div>
        <div class="face right">
          <div class="fan-vent">
            <div class="fan-grill"></div>
            <div class="fan-blades" id="vFan">
              <svg viewBox="0 0 100 100" width="60" height="60">
                <path d="M50 50 L50 10 A20 20 0 0 1 70 30 Z" fill="#666" />
                <path d="M50 50 L90 50 A20 20 0 0 1 70 70 Z" fill="#666" />
                <path d="M50 50 L50 90 A20 20 0 0 1 30 70 Z" fill="#666" />
                <path d="M50 50 L10 50 A20 20 0 0 1 30 30 Z" fill="#666" />
              </svg>
            </div>
          </div>
        </div>
        <div class="face top"></div>
        <div class="face back">
          <div id="vMaintDoor" class="maint-door">
            <div style="padding:20px; font-size:10px; color:#95a5a6;">MAINTENANCE ACCESS</div>
          </div>
        </div>
        <div class="face front">
          <div class="front-header">智能衣物回收箱</div>
          <div id="vStorage" class="capacity-gauge" style="height: 0%;"></div>
          <div id="vChute" class="chute-door">
            <span style="font-size:12px; color:var(--green); font-weight:bold;">PUSH / 投递口</span>
          </div>
          <div style="margin-top:auto; padding-bottom:30px; color:var(--green); font-weight:bold; letter-spacing:2px;">CLOTHES BOX</div>
        </div>
      </div>

      <div style="position:absolute; top:30px; left:30px; background:#fff; padding:10px 20px; border-radius:30px; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
        <span id="onDot" class="dot offline"></span>
        <b id="onText">设备离线</b>
      </div>

      <div style="position:absolute; bottom:30px; right:30px; display:flex; gap:10px;">
        <button class="btn-action" style="padding:8px 15px; font-size:12px;" onclick="rotateScene(0)">正面视角</button>
        <button class="btn-action" style="padding:8px 15px; font-size:12px;" onclick="rotateScene(180)">维护视角</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="glass-card">
        <div class="stat-label">环境温度 / 湿度</div>
        <div class="stat-val"><span id="tVal">--</span>°C / <span id="hVal">--</span>%</div>
        <p id="humanMsg" class="small-text">安全监测：正常</p>
      </div>

      <div class="glass-card">
        <div class="stat-label">箱体满载率</div>
        <div class="stat-val" id="cVal">--%</div>
        <div style="height:6px; background:#eee; border-radius:3px; margin-top:12px; overflow:hidden;">
          <div id="cBar" style="width:0%; height:100%; background:var(--green); transition:1s;"></div>
        </div>
      </div>

      <div class="glass-card">
        <div class="stat-label">空气质量 / 姿态</div>
        <div class="stat-val"><span id="aVal">--</span></div>
        <p id="tiltMsg" class="small-text">姿态监测：水平</p>
      </div>

      <div class="glass-card">
        <div class="stat-label">门禁 / 风扇 / 系统状态</div>
        <div class="status-list">
          <div class="status-row"><span class="status-name">投递口</span><span id="frontDoorVal" class="status-chip off">关闭</span></div>
          <div class="status-row"><span class="status-name">维护门</span><span id="backDoorVal" class="status-chip off">关闭</span></div>
          <div class="status-row"><span class="status-name">风扇</span><span id="fanVal" class="status-chip off">关闭</span></div>
          <div class="status-row"><span class="status-name">告警</span><span id="alarmVal" class="status-chip off">正常</span></div>
          <div class="status-row"><span class="status-name">网络</span><span id="netModeVal" class="status-chip off">--</span></div>
          <div class="status-row"><span class="status-name">状态</span><span id="systemStateVal" class="status-chip off">--</span></div>
        </div>
      </div>
    </div>
  </main>

  <main id="control" class="container">
    <div class="stats-grid" style="grid-template-columns: 1.5fr 1fr;">
      <div class="glass-card">
        <div class="stat-label">远程指令下发</div><br />
        <div class="control-grid">
          <button class="btn-action" onclick="apiControl('OPEN_FRONT')">打开投递口</button>
          <button class="btn-action" onclick="apiControl('CLOSE_FRONT')">关闭投递口</button>
          <button class="btn-action yellow" onclick="apiControl('OPEN_BACK')">打开维护门</button>
          <button class="btn-action yellow" onclick="apiControl('CLOSE_BACK')">关闭维护门</button>
          <button class="btn-action" onclick="apiControl('FAN_ON')">开启风扇</button>
          <button class="btn-action" onclick="apiControl('FAN_OFF')">关闭风扇</button>
          <button class="btn-action red" style="grid-column: span 2;" onclick="apiControl('ALARM_STOP')">停止告警</button>
        </div>
      </div>

      <div class="glass-card">
        <div class="stat-label">操作日志</div>
        <div id="log-box">System ready...</div>
      </div>
    </div>
  </main>

  <main id="config" class="container">
    <div class="stats-grid">
      <div class="glass-card">
        <div class="stat-label">接口配置</div><br />
        <div class="input-row"><span>后端地址</span><input id="apiBaseInput" value="http://localhost:1880/api/v1/box" /></div>
        <div class="input-row"><span>设备编号</span><input id="deviceIdInput" value="ESP32_BOX_001" /></div>
        <button class="btn-action" style="width:100%;" onclick="saveConfig()">保存配置</button>
      </div>

      <div class="glass-card">
        <div class="stat-label">当前连接</div><br />
        <div class="status-list">
          <div class="status-row"><span class="status-name">后端</span><span id="backendConnVal" class="status-chip off">未检测</span></div>
          <div class="status-row"><span class="status-name">设备</span><span id="deviceConnVal" class="status-chip off">离线</span></div>
        </div>
        <button class="btn-action" style="width:100%; margin-top:18px;" onclick="fetchStatus()">立即刷新</button>
      </div>
    </div>
  </main>

  <main id="data" class="container">
    <div class="glass-card">
      <div class="stat-label">传感器历史趋势</div><br />
      <canvas id="histChart" height="100"></canvas>
    </div>

    <div class="stats-grid" style="margin-top:20px;">
      <div class="glass-card">
        <div class="stat-label">告警记录</div>
        <div id="alertList" class="list-box"></div>
      </div>
      <div class="glass-card">
        <div class="stat-label">设备列表</div>
        <div id="devList" class="list-box"></div>
      </div>
    </div>
  </main>

  <script>
    let API_BASE = 'http://localhost:1880/api/v1/box';
    let DEVICE_ID = 'ESP32_BOX_001';
    let myChart = null;
    const optimisticUntil = { front: 0, back: 0, fan: 0 };

    function showTab(event, id) {
      document.querySelectorAll('.nav button').forEach((button) => button.classList.remove('active'));
      event.currentTarget.classList.add('active');
      document.querySelectorAll('.container').forEach((container) => container.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (id === 'data') {
        loadHist();
        loadAlerts();
        loadDevs();
      }
    }

    function rotateScene(deg) {
      document.getElementById('mainScene').style.transform = `rotateY(${deg - 25}deg) rotateX(5deg)`;
    }

    function addLog(message) {
      const box = document.getElementById('log-box');
      box.innerHTML += `> ${new Date().toLocaleTimeString()}: ${message}<br>`;
      box.scrollTop = box.scrollHeight;
    }

    function setChip(id, active, onText, offText, danger) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerText = active ? onText : offText;
      el.className = `status-chip ${active ? (danger ? 'danger' : 'on') : 'off'}`;
    }

    function setPlainChip(id, text, mode) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerText = text || '--';
      el.className = `status-chip ${mode || 'off'}`;
    }

    function saveConfig() {
      API_BASE = document.getElementById('apiBaseInput').value.trim().replace(/\/$/, '');
      DEVICE_ID = document.getElementById('deviceIdInput').value.trim() || 'ESP32_BOX_001';
      localStorage.setItem('smartbox-api-base', API_BASE);
      localStorage.setItem('smartbox-device-id', DEVICE_ID);
      addLog('配置已保存');
      fetchStatus();
    }

    function loadConfig() {
      API_BASE = localStorage.getItem('smartbox-api-base') || API_BASE;
      DEVICE_ID = localStorage.getItem('smartbox-device-id') || DEVICE_ID;
      document.getElementById('apiBaseInput').value = API_BASE;
      document.getElementById('deviceIdInput').value = DEVICE_ID;
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, options);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      return response.json();
    }

    async function fetchStatus() {
      try {
        const result = await fetchJson(`${API_BASE}/status?deviceId=${encodeURIComponent(DEVICE_ID)}`);
        const data = result.data || {};

        document.getElementById('tVal').innerText = Number(data.temperature || 0).toFixed(1);
        document.getElementById('hVal').innerText = Number(data.humidity || 0).toFixed(1);
        document.getElementById('aVal').innerText = Math.round(Number(data.airQuality || 0));

        const capacity = Math.max(0, Math.min(100, Number(data.capacity || 0)));
        document.getElementById('cVal').innerText = `${capacity.toFixed(0)}%`;
        document.getElementById('cBar').style.width = `${capacity}%`;
        document.getElementById('vStorage').style.height = `${capacity}%`;

        const now = Date.now();
        const frontOpen = !!(data.frontDoor || data.frontLight);
        const backOpen = !!(data.backDoor || data.backLight);
        const fanOn = !!data.fanStatus;
        const alarmOn = !!data.boxTiltAlert;
        const online = !!data.online;

        if (now >= optimisticUntil.fan) {
          document.getElementById('vFan').classList.toggle('spinning', fanOn);
        }
        if (now >= optimisticUntil.front) {
          document.getElementById('vChute').classList.toggle('open', frontOpen);
        }
        if (now >= optimisticUntil.back) {
          document.getElementById('vMaintDoor').classList.toggle('open', backOpen);
        }

        document.getElementById('onDot').className = `dot ${online ? 'online' : 'offline'}`;
        document.getElementById('onText').innerText = online ? '设备在线' : '设备离线';
        document.getElementById('humanMsg').innerText = data.humanDetect ? '警告：有人靠近' : '安全监测：正常';
        document.getElementById('humanMsg').style.color = data.humanDetect ? 'var(--yellow)' : 'var(--green)';
        document.getElementById('tiltMsg').innerText = alarmOn ? `警告：箱体倾斜 ${Number(data.tiltAngle || 0).toFixed(1)}°` : `姿态监测：${Number(data.tiltAngle || 0).toFixed(1)}°`;
        document.getElementById('tiltMsg').style.color = alarmOn ? 'var(--red)' : 'var(--yellow)';

        setChip('frontDoorVal', frontOpen, '开启', '关闭');
        setChip('backDoorVal', backOpen, '开启', '关闭');
        setChip('fanVal', fanOn, '运行', '关闭');
        setChip('alarmVal', alarmOn, '告警', '正常', true);
        setPlainChip('netModeVal', data.netMode || '--', data.netMode === 'AP' ? 'warn' : 'on');
        setPlainChip('systemStateVal', data.systemState || '--', alarmOn ? 'danger' : 'on');
        setPlainChip('backendConnVal', '正常', 'on');
        setChip('deviceConnVal', online, '在线', '离线');
      } catch (error) {
        document.getElementById('onDot').className = 'dot offline';
        document.getElementById('onText').innerText = '后端连接失败';
        setPlainChip('backendConnVal', '失败', 'danger');
        setPlainChip('deviceConnVal', '未知', 'warn');
      }
    }

    async function apiControl(action) {
      addLog(`执行指令: ${action}`);

      const holdUntil = Date.now() + 6000;
      if (action === 'OPEN_FRONT') {
        optimisticUntil.front = holdUntil;
        document.getElementById('vChute').classList.add('open');
      } else if (action === 'CLOSE_FRONT') {
        optimisticUntil.front = holdUntil;
        document.getElementById('vChute').classList.remove('open');
      } else if (action === 'OPEN_BACK') {
        optimisticUntil.back = holdUntil;
        rotateScene(180);
        document.getElementById('vMaintDoor').classList.add('open');
      } else if (action === 'CLOSE_BACK') {
        optimisticUntil.back = holdUntil;
        document.getElementById('vMaintDoor').classList.remove('open');
        setTimeout(() => rotateScene(0), 1000);
      } else if (action === 'FAN_ON') {
        optimisticUntil.fan = holdUntil;
        document.getElementById('vFan').classList.add('spinning');
      } else if (action === 'FAN_OFF') {
        optimisticUntil.fan = holdUntil;
        document.getElementById('vFan').classList.remove('spinning');
      }

      try {
        const result = await fetchJson(`${API_BASE}/control`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            deviceId: DEVICE_ID,
            action,
            adminToken: 'admin_auth_secret01'
          })
        });
        const offlineWarning = !!(result.data && result.data.offlineWarning);
        addLog(offlineWarning ? `${result.msg}，设备当前离线` : result.msg);
        setTimeout(fetchStatus, 1200);
      } catch (error) {
        addLog(`错误: ${error.message}`);
      }
    }

    async function loadHist() {
      try {
        const result = await fetchJson(`${API_BASE}/history?deviceId=${encodeURIComponent(DEVICE_ID)}`);
        const data = result.data || {};
        const ctx = document.getElementById('histChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: data.timeline || [],
            datasets: [
              { label: '温度', data: data.tempData || [], borderColor: '#2ecc71', fill: false },
              { label: '湿度', data: data.humidityData || [], borderColor: '#3498db', fill: false },
              { label: '容量', data: data.capacityData || [], borderColor: '#f1c40f', fill: false },
              { label: '倾角', data: data.tiltData || [], borderColor: '#e74c3c', fill: false }
            ]
          },
          options: {
            responsive: true,
            plugins: { legend: { position: 'top' } },
            scales: { y: { beginAtZero: true } }
          }
        });
      } catch (error) {
        document.getElementById('histChart').replaceWith(document.createTextNode(`历史数据加载失败: ${error.message}`));
      }
    }

    async function loadAlerts() {
      try {
        const result = await fetchJson(`${API_BASE}/alerts?deviceId=${encodeURIComponent(DEVICE_ID)}`);
        const rows = Array.isArray(result.data) ? result.data : [];
        document.getElementById('alertList').innerHTML = rows.length
          ? rows.map((item) => `<div class="list-item">${item.time || item.created_at || item.timestamp || '--'}：${item.alertMsg || item.message || item.text || item.alert_type || '告警'}</div>`).join('')
          : '<div class="list-item">暂无告警</div>';
      } catch (error) {
        document.getElementById('alertList').innerHTML = `<div class="list-item">告警加载失败: ${error.message}</div>`;
      }
    }

    async function loadDevs() {
      try {
        const result = await fetchJson(`${API_BASE}/devices`);
        const rows = Array.isArray(result.data) ? result.data : [];
        document.getElementById('devList').innerHTML = rows.length
          ? rows.map((item) => `<div class="list-item">${item.deviceId || item.device_id || '--'} [${item.online ? '在线' : '离线'}]</div>`).join('')
          : '<div class="list-item">暂无设备</div>';
      } catch (error) {
        document.getElementById('devList').innerHTML = `<div class="list-item">设备列表加载失败: ${error.message}</div>`;
      }
    }

    window.onload = () => {
      loadConfig();
      fetchStatus();
      setInterval(fetchStatus, 3000);
    };
  </script>
</body>
</html>
